version: '3.8'
services:
  open-webui:
    image: 'ghcr.io/open-webui/open-webui:main'
    container_name: open-webui
    ports:
      - '8088:8080'
    volumes:
      - 'open-webui-data:/app/backend/data'
    environment:
      WEBUI_SECRET_KEY: 6mQ_bXEgtcuB
      WEBUI_AUTH: 'True'
      ENABLE_OLLAMA_API: 'False'
      ENABLE_SIGNUP: 'True'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.openwebui-custom.rule=Host(`openweb12.ignorelist.com`)
      - traefik.http.routers.openwebui-custom.entrypoints=websecure
      - traefik.http.routers.openwebui-custom.tls=true
      - traefik.http.services.openwebui-custom.loadbalancer.server.port=8080
networks:
  coolify:
    external: true
    name: coolify
volumes:
  open-webui-data:
    name: open-webui-data_volume
    
