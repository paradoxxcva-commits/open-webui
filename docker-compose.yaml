version: '3.8'

services:
  open-webui:
    image: 'ghcr.io/open-webui/open-webui:main'
    container_name: open-webui
    ports:
      - '8088:8080'
    volumes:
      - 'open-webui-data:/app/backend/data'
    # Обязательно оставляем права на маршрутизацию
    cap_add:
      - NET_ADMIN
    environment:
      WEBUI_SECRET_KEY: 6mQ_bXEgtcuB
      WEBUI_AUTH: 'True'
      ENABLE_OLLAMA_API: 'False'
      ENABLE_SIGNUP: 'True'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.openwebui-custom.rule=Host(`openweb12.ignorelist.com`)
      - traefik.http.routers.openwebui-custom.entrypoints=websecure
      - traefik.http.routers.openwebui-custom.tls=true
      - traefik.http.services.openwebui-custom.loadbalancer.server.port=8080
    # Динамически определяем старый шлюз, фиксируем локалку и меняем default gateway
    command: >
      sh -c "
      OLD_GW=\$(ip route show | grep default | awk '{print \$3}');
      if [ -n \"\$OLD_GW\" ]; then
        ip route add 172.16.0.0/12 via \$OLD_GW || true;
        ip route add 192.168.0.0/16 via \$OLD_GW || true;
        ip route add 10.0.0.0/8 via \$OLD_GW || true;
        ip route del default;
      fi;
      ip route add default via 192.168.31.245;
      exec /start.sh
      "

networks:
  coolify:
    external: true
    name: coolify

volumes:
  open-webui-data:
    name: open-webui-data_volume
