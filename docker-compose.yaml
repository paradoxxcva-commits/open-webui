services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"  # Открываем порт 8080 напрямую на домашнем сервере
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      WEBUI_SECRET_KEY: 6mQ_bXEgtcuB
      WEBUI_AUTH: "True"
      ENABLE_OLLAMA_API: "False"  # Отключаем поиск локального Ollama
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

volumes:
  open-webui-data:
